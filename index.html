<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AppCraft Digital</title>
  <meta name="description" content="Developer website for AppCraft Digital apps, including AppLock Ultra support and policy links.">
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fb;
      color: #151820;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 720px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 24px;
      max-width: 56ch;
      color: #4c5565;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    a {
      border: 1px solid #d6dbe6;
      border-radius: 8px;
      color: #1f5eff;
      font-weight: 650;
      padding: 10px 14px;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      border-color: #1f5eff;
      outline: none;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #111318;
        color: #f5f7fb;
      }

      p {
        color: #b9c0ce;
      }

      a {
        border-color: #303847;
        color: #8fb1ff;
      }

      a:hover,
      a:focus-visible {
        border-color: #8fb1ff;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>AppCraft Digital</h1>
    <p>
      AppCraft Digital publishes privacy-focused Android utilities including AppLock Ultra.
      Use the links below for policy, terms, and support information.
    </p>
    <nav aria-label="Developer links">
      <a href="https://sumant4ssm.github.io/applock-ultra-legal/">AppLock Ultra</a>
      <a href="https://sumant4ssm.github.io/applock-ultra-legal/privacy-policy.html">Privacy Policy</a>
      <a href="https://sumant4ssm.github.io/applock-ultra-legal/terms.html">Terms</a>
      <a href="https://sumant4ssm.github.io/applock-ultra-legal/support.html">Support</a>
    </nav>
  </main>
</body>
</html>
